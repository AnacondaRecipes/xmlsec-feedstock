{% set name = "xmlsec" %}
{% set version = "1.3.16" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2b6c70544c6d1d4ca006aaa314958e0ef3514dc81fffde1b23f2ec41a5791f9d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [win or py<35]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
  host:
    - pip
    - python
    - setuptools >=42
    - wheel
    - setuptools_scm >=3.4
    - toml
    - pkgconfig >=1.5.1
    - lxml >=3.8,!=4.7.0
    - libxml2 >=2.9.1
    - libxmlsec1 >=1.2.33
  run:
    - python
    - lxml >=3.8.0,!=4.7.0
    - libxmlsec1 >=1.2.33
    - libxml2 >=2.9.1

test:
  source_files:
    - tests
  imports:
    - xmlsec
  commands:
    - pip check
    - pytest -vvv tests
  requires:
    - pip
    - pytest <7

about:
  home: https://github.com/mehcode/python-xmlsec
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python bindings for the XML Security Library (XMLSec).
  description: |
    Python bindings for the XML Security Library (XMLSec).
  doc_url: https://xmlsec.readthedocs.io
  dev_url: https://github.com/mehcode/python-xmlsec

extra:
  skip-lints:
    - host_section_needs_exact_pinnings