{% set name = "xmlsec" %}
{% set version = "1.3.17" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f3fac9ae679f66585925cc00c5f6839ae36c1d03157619571dee18acc05b9c01

build:
  number: 0
  skip: true  # [win or py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c')}}
    - pkg-config
  host:
    - python
    - libxml2 {{ libxml2 }}
    - libxmlsec1 1.3.5
    - lxml 6.0.2
    - pip
    - pkgconfig >=1.5.1
    - setuptools 80.9.0
    - setuptools_scm >=3.4
    - toml
    - wheel
  run:
    - python
    - lxml >=6.0.2

test:
  imports:
    - xmlsec
  requires:
    - pip
  commands:
    - pip check
    # Check that the correct version is reported by pip
    - "pip list --format json | grep '{\"name\": \"xmlsec\", \"version\": \"{{ version }}\"}'"

about:
  home: https://github.com/xmlsec/python-xmlsec
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python bindings for the XML Security Library (XMLSec).
  description: |
    Python bindings for the XML Security Library (XMLSec).
  doc_url: https://xmlsec.readthedocs.io/
  dev_url: https://github.com/xmlsec/python-xmlsec
